version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: docmanager_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: docmanager
      POSTGRES_PASSWORD: docmanager123
      POSTGRES_DB: docmanager_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U docmanager -d docmanager_db']
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: docmanager_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio_data:/data
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 30s
      timeout: 20s
      retries: 3

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: docmanager_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://docmanager:docmanager123@postgres:5432/docmanager_db
    ports:
      - '3000:3000'
    env_file:
      - .env

volumes:
  postgres_data:
  minio_data:
