version: '3.9'

services:

  # ── Infra ──────────────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    container_name: docmanager_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: docmanager
      POSTGRES_PASSWORD: docmanager123
      POSTGRES_DB: docmanager_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U docmanager -d docmanager_db']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: docmanager_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: docmanager_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - '9000:9000'  # API S3
      - '9001:9001'  # Console web
    volumes:
      - minio_data:/data
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 30s
      timeout: 20s
      retries: 3

  # ── Backend ────────────────────────────────────────────────────────────────

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: docmanager_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://docmanager:docmanager123@postgres:5432/docmanager_db
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_USE_SSL: 'false'
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: docmanager
      CORS_ORIGINS: http://localhost
      JWT_SECRET: change_me_in_production_at_least_32_chars!!
      JWT_REFRESH_SECRET: change_me_refresh_in_production_32chars!
      MASTER_ADMIN_EMAIL: admin@docmanager.com
      MASTER_ADMIN_PASSWORD: Admin@123456
      MASTER_COMPANY_NAME: Master Company
    expose:
      - '3000'
    healthcheck:
      test: ['CMD', 'node', '-e', "require('http').get('http://localhost:3000/health', r => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

  # ── Frontend ───────────────────────────────────────────────────────────────

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: docmanager_frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - '80:80'

# ── Volumes ────────────────────────────────────────────────────────────────────

volumes:
  postgres_data:
  redis_data:
  minio_data:
