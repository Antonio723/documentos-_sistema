version: '3.9'

services:
  redis:
    image: redis:7
    container_name: docmanager_redis
    ports:
      - "6379:6379"
    restart: always

  postgres:
    image: postgres:16
    container_name: docmanager_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
      POSTGRES_DB: docmanager
    ports:
      - "5433:5432" 
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

volumes:
  postgres_data: